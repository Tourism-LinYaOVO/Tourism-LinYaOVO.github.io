<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站</title>
    
    <!-- GitHub Pages 优化 -->
    <!-- 添加这些meta标签确保更好的兼容性 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="我的静态网站">
    
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 添加字体回退方案 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding-top: 80px;
            background-color: #f5f5f5;
            line-height: 1.6;
        }
        
        /* 顶栏容器 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        
        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            height: 80px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Logo样式 */
        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            font-weight: bold;
            font-size: 20px;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin-left: 10px;
        }
        
        /* 导航菜单 */
        .nav-menu {
            display: flex;
            list-style: none;
        }
        
        .nav-item {
            position: relative;
        }
        
        .nav-link {
            display: block;
            padding: 10px 15px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav-link:hover {
            color: #3498db;
        }
        
        .nav-link.active {
            color: #3498db;
        }
        
        /* 下拉菜单样式 */
        .dropdown-content {
            position: absolute;
            top: 100%;
            left: 0;
            background-color: white;
            min-width: 200px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-radius: 5px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s;
        }
        
        .dropdown:hover .dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .dropdown-content a {
            display: block;
            padding: 10px 15px;
            text-decoration: none;
            color: #333;
            border-bottom: 1px solid #eee;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .dropdown-content a:hover {
            background-color: #f5f5f5;
            color: #3498db;
        }
        
        .dropdown-content a:last-child {
            border-bottom: none;
        }
        
        /* 移动端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #333;
            padding: 8px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        
        .mobile-menu-btn:hover {
            background-color: #f5f5f5;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
            
            .nav-menu {
                position: fixed;
                top: 80px;
                left: 0;
                width: 100%;
                background-color: white;
                flex-direction: column;
                padding: 20px;
                box-shadow: 0 5px 10px rgba(0,0,0,0.1);
                display: none;
            }
            
            .nav-menu.active {
                display: flex;
            }
            
            .dropdown-content {
                position: static;
                opacity: 1;
                visibility: visible;
                transform: none;
                box-shadow: none;
                background-color: #f9f9f9;
                margin-top: 10px;
                display: none;
            }
            
            .dropdown.active .dropdown-content {
                display: block;
            }
            
            /* 为下拉菜单添加箭头指示 */
            .dropdown > .nav-link::after {
                content: "▼";
                font-size: 10px;
                margin-left: 5px;
            }
            
            .dropdown.active > .nav-link::after {
                content: "▲";
            }
        }
        
        /* 页面内容样式 */
        .content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1, h2, h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        
        p {
            margin-bottom: 15px;
            color: #555;
        }
        
        .test-section {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <!-- 顶栏 -->
    <nav class="navbar">
        <div class="navbar-container">
            <!-- Logo -->
            <a href="/" class="logo">
                <div class="logo-icon">T</div>
                <div class="logo-text">TourTi</div>
            </a>
            
            <!-- 导航菜单 -->
            <ul class="nav-menu" id="navMenu">
                <!-- 首页 -->
                <li class="nav-item">
                    <a href="#" class="nav-link active">首页</a>
                </li>
                
                <!-- 分类1：技术文章 -->
                <li class="nav-item dropdown">
                    <a href="#" class="nav-link">技术文章</a>
                    <div class="dropdown-content">
                        <a href="#">Web开发</a>
                        <a href="#">移动开发</a>
                        <a href="#">人工智能</a>
                        <a href="#">数据科学</a>
                    </div>
                </li>
                
                <!-- 分类2：学习资源 -->
                <li class="nav-item dropdown">
                    <a href="#" class="nav-link">学习资源</a>
                    <div class="dropdown-content">
                        <a href="#">教程</a>
                        <a href="#">文档</a>
                        <a href="#">视频课程</a>
                        <a href="#">书籍推荐</a>
                    </div>
                </li>
                
                <!-- 分类3：项目展示 -->
                <li class="nav-item dropdown">
                    <a href="#" class="nav-link">项目展示</a>
                    <div class="dropdown-content">
                        <a href="#">Web项目</a>
                        <a href="#">移动应用</a>
                        <a href="#">开源项目</a>
                        <a href="#">演示案例</a>
                    </div>
                </li>
                
                <!-- 关于我们 -->
                <li class="nav-item">
                    <a href="#" class="nav-link">关于我们</a>
                </li>
                
                <!-- 联系方式 -->
                <li class="nav-item">
                    <a href="#" class="nav-link">联系方式</a>
                </li>
            </ul>
            
            <!-- 移动端菜单按钮 -->
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>
    
        <h1>正在调整中…</h1>
    
    <script>
        // 移动端菜单切换
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navMenu = document.getElementById('navMenu');
        
        mobileMenuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            navMenu.classList.toggle('active');
        });
        
        // 修复移动端分类菜单点击问题
        const dropdowns = document.querySelectorAll('.dropdown');
        
        dropdowns.forEach(dropdown => {
            const dropdownLink = dropdown.querySelector('.nav-link');
            
            dropdownLink.addEventListener('click', function(e) {
                // 只在移动端处理
                if (window.innerWidth <= 768) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    // 切换当前下拉菜单的active状态
                    dropdown.classList.toggle('active');
                    
                    // 关闭其他打开的下拉菜单
                    dropdowns.forEach(otherDropdown => {
                        if (otherDropdown !== dropdown) {
                            otherDropdown.classList.remove('active');
                        }
                    });
                }
            });
        });
        
        // 点击下拉菜单中的链接
        const dropdownLinks = document.querySelectorAll('.dropdown-content a');
        dropdownLinks.forEach(link => {
            link.addEventListener('click', function() {
                // 如果是移动端，点击链接后关闭整个菜单
                if (window.innerWidth <= 768) {
                    navMenu.classList.remove('active');
                    
                    // 移除所有下拉菜单的active状态
                    dropdowns.forEach(dropdown => {
                        dropdown.classList.remove('active');
                    });
                }
                
                // 移除所有nav-link的active类
                const allNavLinks = document.querySelectorAll('.nav-link');
                allNavLinks.forEach(navLink => {
                    navLink.classList.remove('active');
                });
                
                // 这里可以添加页面跳转逻辑
                // window.location.href = this.getAttribute('href');
            });
        });
        
        // 点击普通导航链接
        const navLinks = document.querySelectorAll('.nav-item:not(.dropdown) .nav-link');
        navLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                // 移除所有nav-link的active类
                const allNavLinks = document.querySelectorAll('.nav-link');
                allNavLinks.forEach(navLink => {
                    navLink.classList.remove('active');
                });
                
                // 添加active类到当前链接
                this.classList.add('active');
                
                // 如果是移动端，点击链接后关闭整个菜单
                if (window.innerWidth <= 768) {
                    navMenu.classList.remove('active');
                    
                    // 移除所有下拉菜单的active状态
                    dropdowns.forEach(dropdown => {
                        dropdown.classList.remove('active');
                    });
                }
                
                // 这里可以添加页面跳转逻辑
                // window.location.href = this.getAttribute('href');
            });
        });
        
        // 点击页面其他地方关闭菜单
        document.addEventListener('click', function(e) {
            // 如果是移动端
            if (window.innerWidth <= 768) {
                // 如果点击的不是菜单按钮和菜单内容
                if (!mobileMenuBtn.contains(e.target) && !navMenu.contains(e.target)) {
                    navMenu.classList.remove('active');
                    
                    // 移除所有下拉菜单的active状态
                    dropdowns.forEach(dropdown => {
                        dropdown.classList.remove('active');
                    });
                }
            }
        });
        
        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            console.log('GitHub Pages优化顶栏已加载完成');
        });
    </script>
</body>
</html>
