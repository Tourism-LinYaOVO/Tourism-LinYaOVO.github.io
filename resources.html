<!DOCTYPE html>
<html>
<head>
    <title>TourTi的资源站</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>TourTi的资源站</h1>
    <p>这里只是存放一些我需要存储的东西，你要用也行。</p>
    
    <div id="loading">加载中...</div>
    <div id="error" style="display:none; color:red;"></div>
    <ul id="fileList"></ul>
    
    <div>最后更新: <span id="lastUpdated">-</span> | 共 <span id="fileCount">0</span> 个文件</div>
    
    <script>
        // 主函数
        async function loadFileList() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const fileListEl = document.getElementById('fileList');
            const fileCountEl = document.getElementById('fileCount');
            const lastUpdatedEl = document.getElementById('lastUpdated');
            
            try {
                // 1. 尝试不同的JSON文件路径
                const jsonPaths = [
                    'file-list.json',
                    './file-list.json',
                    '/file-list.json'
                ];
                
                let response = null;
                let usedPath = '';
                
                for (const path of jsonPaths) {
                    try {
                        response = await fetch(path);
                        if (response.ok) {
                            usedPath = path;
                            break;
                        }
                    } catch (e) {
                        // 继续尝试下一个路径
                    }
                }
                
                if (!response || !response.ok) {
                    throw new Error('无法加载 file-list.json');
                }
                
                const config = await response.json();
                
                if (!config.files || !Array.isArray(config.files)) {
                    throw new Error('JSON格式错误: 缺少files数组');
                }
                
                // 2. 清空加载提示
                loadingEl.style.display = 'none';
                
                // 3. 更新文件计数
                fileCountEl.textContent = config.files.length;
                lastUpdatedEl.textContent = new Date().toLocaleDateString('zh-CN');
                
                // 4. 显示文件列表
                config.files.forEach(file => {
                    const listItem = document.createElement('li');
                    const link = document.createElement('a');
                    link.href = `files/${encodeURIComponent(file.name)}`;
                    link.textContent = file.name;
                    
                    if (file.description) {
                        const desc = document.createElement('span');
                        desc.textContent = ` - ${file.description}`;
                        desc.style.color = '#666';
                        link.appendChild(desc);
                    }
                    
                    listItem.appendChild(link);
                    fileListEl.appendChild(listItem);
                });
                
            } catch (error) {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.textContent = `错误: ${error.message}`;
                console.error('加载失败:', error);
            }
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadFileList);
    </script>
</body>
</html>
