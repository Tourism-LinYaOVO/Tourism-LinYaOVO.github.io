<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourTi的光标样式预览</title>
</head>
<body>
    <p>将鼠标悬停在以下文本上，查看对应的光标样式：</p>
    
    <div id="cursorList">
        <!-- 光标列表将通过JavaScript动态生成，每个样式占一行 -->
    </div>
    
    <p>当前光标样式: <span id="currentCursorName">default</span></p>
    
    <script>
        const cursorStyles = [
            { value: 'auto', name: 'auto', description: '浏览器根据上下文自动选择光标' },
            { value: 'default', name: 'default', description: '默认箭头光标' },
            { value: 'none', name: 'none', description: '不显示光标' },
            { value: 'context-menu', name: 'context-menu', description: '上下文菜单可用' },
            { value: 'help', name: 'help', description: '帮助光标（问号）' },
            { value: 'pointer', name: 'pointer', description: '手形光标，表示链接可点击' },
            { value: 'progress', name: 'progress', description: '进度光标，表示程序忙但可交互' },
            { value: 'wait', name: 'wait', description: '等待光标，表示程序忙不可交互' },
            { value: 'cell', name: 'cell', description: '单元格光标，表示可选择单元格' },
            { value: 'crosshair', name: 'crosshair', description: '十字线光标，用于精确定位' },
            { value: 'text', name: 'text', description: '文本光标（I型）' },
            { value: 'vertical-text', name: 'vertical-text', description: '垂直文本光标' },
            { value: 'alias', name: 'alias', description: '别名光标，表示创建快捷方式' },
            { value: 'copy', name: 'copy', description: '复制光标' },
            { value: 'move', name: 'move', description: '移动光标' },
            { value: 'no-drop', name: 'no-drop', description: '不可放置光标' },
            { value: 'not-allowed', name: 'not-allowed', description: '禁止操作光标' },
            { value: 'grab', name: 'grab', description: '抓取光标（打开的手）' },
            { value: 'grabbing', name: 'grabbing', description: '正在抓取光标（握紧的手）' },
            { value: 'all-scroll', name: 'all-scroll', description: '全方位滚动光标' },
            { value: 'col-resize', name: 'col-resize', description: '列调整大小光标' },
            { value: 'row-resize', name: 'row-resize', description: '行调整大小光标' },
            { value: 'n-resize', name: 'n-resize', description: '向上调整大小光标' },
            { value: 'e-resize', name: 'e-resize', description: '向右调整大小光标' },
            { value: 's-resize', name: 's-resize', description: '向下调整大小光标' },
            { value: 'w-resize', name: 'w-resize', description: '向左调整大小光标' },
            { value: 'ne-resize', name: 'ne-resize', description: '向右上调整大小光标' },
            { value: 'nw-resize', name: 'nw-resize', description: '向左上调整大小光标' },
            { value: 'se-resize', name: 'se-resize', description: '向右下调整大小光标' },
            { value: 'sw-resize', name: 'sw-resize', description: '向左下调整大小光标' },
            { value: 'ew-resize', name: 'ew-resize', description: '水平双向调整大小光标' },
            { value: 'ns-resize', name: 'ns-resize', description: '垂直双向调整大小光标' },
            { value: 'nesw-resize', name: 'nesw-resize', description: '对角线双向调整大小光标（右上-左下）' },
            { value: 'nwse-resize', name: 'nwse-resize', description: '对角线双向调整大小光标（左上-右下）' },
            { value: 'zoom-in', name: 'zoom-in', description: '放大光标' },
            { value: 'zoom-out', name: 'zoom-out', description: '缩小光标' }
        ];

        const cursorList = document.getElementById('cursorList');
        const currentCursorName = document.getElementById('currentCursorName');

        // 为每个光标样式创建一行
        cursorStyles.forEach(cursor => {
            // 创建一个包含光标样式名称和描述的div
            const line = document.createElement('div');
            line.style.margin = '5px 0';
            line.style.padding = '3px 0';
            line.style.cursor = cursor.value;
            
            // 当鼠标悬停在这一行时，更新显示当前光标样式名称
            line.addEventListener('mouseover', () => {
                currentCursorName.textContent = `${cursor.name} (${cursor.value}) - ${cursor.description}`;
            });
            
            // 当鼠标离开这一行时，恢复显示默认
            line.addEventListener('mouseout', () => {
                currentCursorName.textContent = 'default';
            });
            
            // 设置行内容
            line.textContent = `${cursor.name}: ${cursor.description}`;
            
            cursorList.appendChild(line);
        });
    </script>
</body>
</html>
